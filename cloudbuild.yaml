steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'

  # Step 3: Create or Update Cloud Run Job
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs update uipath-to-python-job \
          --image gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA \
          --region us-central1 \
          --memory 2Gi \
          --cpu 1 \
          --task-timeout 3600s \
          --command python \
          --args "tasks.py,consumer" || \
        gcloud run jobs create uipath-to-python-job \
          --image gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA \
          --region us-central1 \
          --memory 2Gi \
          --cpu 1 \
          --task-timeout 3600s \
          --command python \
          --args "tasks.py,consumer"

images:
  - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/uipath-to-python:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
