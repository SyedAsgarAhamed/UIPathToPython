steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run (optional - for serverless)
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'uipath-to-python'
      - '--image'
      - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--timeout'
      - '3600'

images:
  - 'gcr.io/$PROJECT_ID/uipath-to-python:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/uipath-to-python:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
